version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend-static:/app/static
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///app/instance/app.db
    networks:
      - logistics-network
    command: python run.py

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logistics-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - logistics-network

  # Nginx 反向代理（可选，用于统一入口）
  nginx:
    image: nginx:stable-alpine
    container_name: logistics-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - logistics-network

volumes:
  backend-static:

networks:
  logistics-network:
    driver: bridge
